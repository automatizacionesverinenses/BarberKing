<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberKing — Iniciar Sesión / Registro</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg);
      margin: 0;
    }
    
    .auth-container {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-2xl);
      width: 100%;
      max-width: 450px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .auth-logo {
      font-size: 2.5rem;
      color: var(--color-gold-primary);
      margin-bottom: var(--space-sm);
    }

    .auth-title {
      font-size: 2rem;
      margin-bottom: var(--space-xs);
      color: #a67c00; /* Darker gold */
      font-weight: 800;
    }

    .auth-subtitle {
      color: var(--color-text-secondary);
      font-size: 0.9rem;
    }

    .auth-tabs {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      border-bottom: 1px solid var(--color-border);
      padding-bottom: var(--space-sm);
    }

    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--color-text-secondary);
      font-size: 1rem;
      font-weight: 600;
      padding: var(--space-xs) var(--space-sm);
      cursor: pointer;
      transition: var(--transition-fast);
      position: relative;
    }

    .auth-tab.active {
      color: var(--color-gold-primary);
    }

    .auth-tab.active::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--color-gold-primary);
    }

    .auth-form {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: var(--space-md);
    }

    .form-label {
      display: block;
      margin-bottom: var(--space-xs);
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }

    .form-input {
      width: 100%;
      padding: var(--space-sm);
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: var(--radius-sm);
      color: #333333;
      font-family: inherit;
      transition: var(--transition-fast);
    }

    .form-input::placeholder {
      color: #999999;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-gold-primary);
      background: #ffffff;
    }

    .btn-submit {
      width: 100%;
      margin-top: var(--space-md);
    }

    .error-msg {
      color: #ff4b4b;
      font-size: 0.85rem;
      margin-top: var(--space-xs);
      display: none;
    }

    .back-link {
      display: inline-block;
      margin-top: var(--space-xl);
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: var(--transition-fast);
      text-align: center;
      width: 100%;
    }

    .back-link:hover {
      color: var(--color-gold-primary);
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">✂</div>
      <h1 class="auth-title">BarberKing</h1>
      <p class="auth-subtitle">Accede para gestionar tus citas</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Iniciar Sesión</button>
      <button class="auth-tab" id="tab-register">Registrarse</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="form-login">
      <div class="form-group">
        <label class="form-label" for="login-email">Correo Electrónico</label>
        <input type="email" class="form-input" id="login-email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Contraseña</label>
        <input type="password" class="form-input" id="login-password" required>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn btn-primary btn-submit">Entrar</button>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="form-register">
      <div style="display: flex; gap: var(--space-sm);">
        <div class="form-group" style="flex: 1;">
          <label class="form-label" for="reg-name">Nombre</label>
          <input type="text" class="form-input" id="reg-name" required>
        </div>
        <div class="form-group" style="flex: 1;">
          <label class="form-label" for="reg-surname">Apellidos</label>
          <input type="text" class="form-input" id="reg-surname" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-phone">Teléfono</label>
        <input type="tel" class="form-input" id="reg-phone" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Correo Electrónico</label>
        <input type="email" class="form-input" id="reg-email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Contraseña</label>
        <input type="password" class="form-input" id="reg-password" required>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button type="submit" class="btn btn-primary btn-submit">Crear Cuenta</button>
    </form>

    <a href="index.html" class="back-link">← Volver a la web</a>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/auth.js"></script>
</body>
</html>
